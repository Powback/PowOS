# powstream - Vulkan capture layer for PowStream game streaming
#
# System-wide install of the PowStream implicit Vulkan layer:
#   /usr/lib/powstream/libvklayer_powstream_capture.so
#   /usr/share/vulkan/implicit_layer.d/VkLayer_POWSTREAM_capture.json
#   /usr/lib/environment.d/powstream.conf   (POWSTREAM_CAPTURE=1)
#
# Replaces the per-user install (layers/vk-capture/install.sh writes to
# ~/.local/*), which powos backup does NOT cover. As an overlay this is
# persisted in the custom layer and recreated on any machine via
# `powos backup pull` + `powos update overlays`.
#
# The layer is dormant (zero overhead) unless the PowStream server has
# created /tmp/depthcap/streaming.active. Kill switch: POWSTREAM_CAPTURE_DISABLE=1.

SOURCE_NAME="powstream"
SOURCE_DESCRIPTION="PowStream Vulkan capture layer (system-wide)"
# Local checkout preferred; falls back to cloning UPSTREAM_URL
UPSTREAM_URL="https://github.com/Powback/PowStream"
LOCAL_CHECKOUT="${HOME}/Projects/PowStream"
