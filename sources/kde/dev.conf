# KDE Applications - Development Configuration
# Used by 'powos dev fork kde:<app>'

DESCRIPTION="KDE Applications (Dolphin, Konsole, Kate, Gwenview, Okular, etc.)"

# KDE Invent base URL
KDE_INVENT_URL="https://invent.kde.org"

# App categories on KDE Invent
declare -A KDE_APP_CATEGORIES=(
    [dolphin]="system"
    [plasma-desktop]="plasma"
    [konsole]="utilities"
    [kate]="utilities"
    [gwenview]="graphics"
    [okular]="graphics"
    [spectacle]="graphics"
    [ark]="utilities"
    [kcalc]="utilities"
    [filelight]="utilities"
)

# Build dependencies (covers most KDE apps)
BUILD_DEPS="cmake extra-cmake-modules gcc-c++ qt6-qtbase-devel qt6-qtdeclarative-devel kf6-kio-devel kf6-kparts-devel kf6-kwindowsystem-devel kf6-knewstuff-devel kf6-kcmutils-devel kf6-kitemmodels-devel kf6-kcrash-devel kf6-kdbusaddons-devel kf6-ki18n-devel kf6-kcodecs-devel kf6-ktextwidgets-devel kf6-knotifications-devel kf6-kbookmarks-devel kf6-kconfig-devel kf6-kcoreaddons-devel kf6-solid-devel kf6-baloo-devel kf6-kfilemetadata-devel kf6-kpty-devel kf6-ktexteditor-devel kf6-syntax-highlighting-devel"
