# KDE Applications Source
# Shared source for all KDE apps (Dolphin, Konsole, Kate, etc.)
#
# Committable modding workflow (version-controlled, baked into every image build):
#   powos dev fork kde:dolphin        # clone Dolphin source into a fork project
#   # …edit the source in the fork's src/…
#   powos dev patch dolphin my-fix    # → sources/kde/patches/dolphin/001-my-fix.patch
#   git add sources/kde/patches/dolphin/ && git commit
#
# The image build applies every patch under patches/<app>/ (git apply / patch -p1):
#   patches/dolphin/001-my-feature.patch
#   patches/konsole/001-my-fix.patch
# (You can also drop a hand-written .patch in patches/<app>/ directly.)

DESCRIPTION="KDE Applications (Dolphin, Konsole, Kate, Gwenview, Okular, etc.)"

# KDE Gear release - all apps versioned together
KDE_GEAR_VERSION="24.12"
KDE_FRAMEWORKS_VERSION="6.21"

# Base URLs
KDE_INVENT_URL="https://invent.kde.org"

# Apps to fetch (add more as needed)
KDE_APPS="dolphin konsole kate gwenview okular spectacle ark"

# Build dependencies (covers most KDE apps)
BUILD_DEPS="cmake extra-cmake-modules gcc-c++ qt6-qtbase-devel qt6-qtdeclarative-devel kf6-kio-devel kf6-kparts-devel kf6-kwindowsystem-devel kf6-knewstuff-devel kf6-kcmutils-devel kf6-kitemmodels-devel kf6-kcrash-devel kf6-kdbusaddons-devel kf6-ki18n-devel kf6-kcodecs-devel kf6-ktextwidgets-devel kf6-knotifications-devel kf6-kbookmarks-devel kf6-kconfig-devel kf6-kcoreaddons-devel kf6-solid-devel kf6-baloo-devel kf6-kfilemetadata-devel kf6-kpty-devel kf6-ktexteditor-devel kf6-syntax-highlighting-devel"

RUNTIME_DEPS="qt6-qtbase kf6-kio kf6-kparts"
