# Fast image-build config for plasma-desktop patches: build ONLY the
# taskmanager applet target and ship ONLY its plugin (QML is embedded in the
# .so via qrc). Everything else falls through to the base package.
BUILD_TARGETS="org.kde.plasma.taskmanager"
SHIP_ARTIFACTS="bin/plasma/applets/org.kde.plasma.taskmanager.so:/usr/lib64/qt6/plugins/plasma/applets/"
