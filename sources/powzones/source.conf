# KZones — FancyZones-style zone snapping for KDE Plasma/KWin
#
# Ships upstream KZones without patching. "PowZones" branding only applies
# if we ever add patches; until then we vendor the upstream release + config.
#
# Used by the overlay system for user-triggered builds and updates:
#   powos overlay build powzones    # (re)install latest KZones
#   powos overlay enable powzones   # activate via systemd-sysext
#
# The image bakes KZones in directly via the Containerfile RUN step so it
# is present for every user on first boot without needing powos overlay enable.

SOURCE_NAME="powzones"
SOURCE_DESCRIPTION="KZones: FancyZones-style window zone snapping for KDE Plasma (KWin script)"
UPSTREAM_URL="https://github.com/gerritdevriese/kzones"
UPSTREAM_VERSION="v0.9.2"
KWINSCRIPT_URL="https://github.com/gerritdevriese/kzones/releases/download/${UPSTREAM_VERSION}/kzones.kwinscript"

# Runtime: KWin (KDE Plasma 6+). No compiled code — pure JS/QML.
BUILD_DEPS="curl unzip"
RUNTIME_DEPS="kwin"
