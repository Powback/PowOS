name: Build, Test & Publish PowOS

# Single pipeline: lint → build+test+publish (one runner, one image build).
# Replaces the old separate `PowOS CI` + `Build & Publish PowOS` workflows,
# which each did an independent podman build of the same Containerfile on
# separate runners and wasted ~6 min of duplicated work per push.
#
# Design: build LOCAL to the runner (no push yet), run tests against the local
# image, and only push once tests pass. No SHA-tagged candidates leak to the
# registry when tests fail — clean history, no pull between jobs, no orphan
# images to clean up.
#
# `bootc upgrade` follows channel tags (:nvidia-open, :latest), which are only
# pushed if the build's test suite passed for that commit. Red builds never
# reach a user's machine.
#
# Variants:
#   nvidia-open          NVIDIA open kernel modules (DEFAULT; RTX 50-series REQUIRES this).
#                         Built + tested + published on every push to master.
#                         Also gets :latest.
#   nvidia-open-testing  Tracks ghcr.io/ublue-os/bazzite-nvidia-open:testing.
#                         Built weekly via cron (or workflow_dispatch). NOT
#                         E2E-tested (by intent — the :testing base is by
#                         definition experimental upstream), and NEVER built
#                         on push (master pushes don't change bazzite:testing,
#                         so a per-push rebuild would double CI for zero
#                         signal).

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/build-disk-image.yml'
      - '.github/workflows/registry-cleanup.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      variant:
        description: Which variant to build (dispatch only)
        type: choice
        default: all
        options: [ all, nvidia-open, nvidia-open-testing ]
  schedule:
    - cron: '0 6 * * 1'   # weekly rebuild to pick up new bazzite :stable/:testing

# One in-flight run per ref. Do NOT cancel-in-progress — with pushes landing
# every few minutes and runs taking ~10-15 min, cancel-in-progress starves the
# pipeline. GitHub auto-cancels older PENDING runs in the group.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/powback/powos

jobs:
  # ─── STAGE 1: lint + tier1 (no image needed, fast fail) ─────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (errors only — style/info are tracked debt)
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -S error bin/* lib/*.sh build/*.sh

      - name: Tier1 dev-mode bash tests
        run: |
          bash test/tier1/test-hardware-detect.sh
          bash test/tier1/test-pinstall.sh
          bash test/tier1/test-install-system.sh
          bash test/tier1/test-vm.sh
          bash test/tier1/test-gpu.sh
          bash test/tier1/test-variant-select.sh
          bash test/tier1/test-base.sh
          bash test/tier1/test-boot-manager.sh
          bash test/tier1/test-config.sh
          bash test/tier1/test-uninstall.sh

      - name: Data integrity (layer-sync, cachefs unit tests)
        run: |
          pip install psutil rich 2>/dev/null || true
          python3 test/tier1/test-layer-sync.py
          python3 test/tier1/test-cachefs.py

  # ─── STAGE 2: build image locally, test against it, push on green ────────
  # Everything happens on one runner in the runner's local podman store.
  # No cross-job image transfer, no SHA-tagged candidates polluting GHCR on
  # red builds — the image only leaves this runner if tests passed.
  build-test-publish:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ nvidia-open, nvidia-open-testing ]
    steps:
      - name: Gate (skip -testing on push events; honor dispatch variant input)
        id: gate
        run: |
          sel='${{ github.event.inputs.variant }}'
          if [[ -n "$sel" && "$sel" != "all" && "$sel" != "${{ matrix.variant }}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ matrix.variant }}" == "nvidia-open-testing" ]]; then
            # -testing tracks bazzite:testing which push doesn't change.
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Free disk space (bazzite base + built image ≈ 15GB, runner has ~14GB free)
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Resolve base image
        if: steps.gate.outputs.run == 'true'
        id: base
        run: |
          case "${{ matrix.variant }}" in
            nvidia-open)         img=ghcr.io/ublue-os/bazzite-nvidia-open:stable ;;
            nvidia-open-testing) img=ghcr.io/ublue-os/bazzite-nvidia-open:testing ;;
          esac
          echo "image=$img" >> "$GITHUB_OUTPUT"

      - name: Vendor bazzite system_files
        if: steps.gate.outputs.run == 'true'
        run: ./build/vendor-bazzite.sh

      - name: Snapshot source tree (bundled into image as /usr/lib/powos/src)
        # `git archive HEAD` gives us a clean, .git-free, .gitattributes-honoring
        # snapshot of the exact commit being built. tmpfiles.d then seeds it into
        # /var/lib/powos/src on first boot so `powos self test/pull/push` has a
        # writable working copy.
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p .snapshot
          git archive HEAD | tar -x -C .snapshot

      - name: Log in to GHCR (rootful podman — layer-sync test needs root for mknod)
        if: steps.gate.outputs.run == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build ${{ matrix.variant }} (local only — not pushed yet)
        if: steps.gate.outputs.run == 'true'
        run: |
          # Registry layer cache lives in GHCR: pull unchanged layers from the
          # previous build so a script-only change doesn't redo the whole base.
          # NOTE: podman requires cache repo WITHOUT a tag — it manages its own
          # per-layer tags. A :tag makes every build fail at arg parsing.
          sudo podman build --layers \
            --cache-from ${{ env.IMAGE }}-cache-${{ matrix.variant }} \
            --cache-to   ${{ env.IMAGE }}-cache-${{ matrix.variant }} \
            --build-arg BASE_IMAGE=${{ steps.base.outputs.image }} \
            --build-arg POWOS_SRC_COMMIT=${{ github.sha }} \
            -f Containerfile \
            -t ${{ env.IMAGE }}:${{ matrix.variant }} \
            -t ${{ env.IMAGE }}:${{ matrix.variant }}-${{ github.sha }} \
            -t powos-ci \
            .

      - name: Container tests (tier1 inside the actual image) — nvidia-open only
        if: steps.gate.outputs.run == 'true' && matrix.variant == 'nvidia-open'
        run: |
          sudo podman run --rm -v "$PWD:/powos:rw" -e POWOS_ROOT=/powos \
            --entrypoint /bin/bash powos-ci -c '
              set -e
              bash /powos/test/tier1/test-hardware-detect.sh
              bash /powos/test/tier1/test-pinstall.sh
              bash /powos/test/tier1/test-overlay.sh
              bash /powos/test/tier1/test-sync.sh
              bash /powos/test/tier1/test-ai-agent.sh
            '

      - name: E2E tests (loop-back USB, overlayfs, layer-sync, cachefs) — nvidia-open only
        # fusepy is a test-only Python dep, installed inside the ephemeral test
        # container rather than baked into the production image. --target
        # /tmp/pypkg + PYTHONPATH: bulletproof against Bazzite's ostree paths
        # (e.g. /usr/local/lib absent inside a container), so pip writes to a
        # path we own and Python auto-picks it up.
        if: steps.gate.outputs.run == 'true' && matrix.variant == 'nvidia-open'
        run: |
          sudo podman volume create powos-e2e-usb
          sudo podman run --rm --privileged --hostname powos-e2e \
            --device /dev/fuse --device /dev/loop-control \
            -v "$PWD:/powos:ro" -v powos-e2e-usb:/var/lib/powos-test \
            --tmpfs /run/powos --tmpfs /tmp \
            -e POWOS_ROOT=/powos -e POWOS_E2E=1 \
            --entrypoint /bin/bash powos-ci -c '
              set -e
              mkdir -p /tmp/pypkg
              pip3 install --break-system-packages --target /tmp/pypkg --quiet fusepy
              export PYTHONPATH=/tmp/pypkg
              exec /powos/test/e2e/run-e2e.sh
            '

      - name: Push (only reached if all tests above passed)
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo podman push ${{ env.IMAGE }}:${{ matrix.variant }}
          sudo podman push ${{ env.IMAGE }}:${{ matrix.variant }}-${{ github.sha }}
          if [[ "${{ matrix.variant }}" == "nvidia-open" ]]; then
            sudo podman tag ${{ env.IMAGE }}:nvidia-open ${{ env.IMAGE }}:latest
            sudo podman push ${{ env.IMAGE }}:latest
          fi
