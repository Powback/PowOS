name: Build Disk Image (USB)

# Builds the flashable live-USB disk image (powos.raw) from an already-published
# OS image using bootc-image-builder, and uploads it as a compressed artifact.
#
# Runs on demand only — the .raw is ~30GB uncompressed and most pushes don't
# need one. Local builds on Apple Silicon are blocked by amd64 emulation
# (crun memfd re-exec + libpod SHM-lock failures under Rosetta), so CI's
# native amd64 runners are the supported path.
#
# NOTE: current bootc-image-builder renamed the type 'raw-efi' -> 'raw' and
# no longer pulls images itself (requires a pre-pulled image in rootful
# containers-storage). build/build-iso.sh predates both changes.
#
# Disk budget (ubuntu-24.04 runners have ONE 72GB disk, ~51GB free after
# cleanup — /mnt is NOT a separate device anymore): the OS image needs 15GB
# in containers-storage, disk.raw is ~30GB nominal, and osbuild's export is
# a `cp --reflink=auto` of the whole thing. On ext4 that copy is a full
# second 30GB — doesn't fit. Solution: /store and /output share an XFS
# loopback volume, so the export reflinks for free.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Which published variant to build the disk image from
        type: choice
        default: nvidia-open
        options: [ nvidia-open, nvidia, main ]

env:
  IMAGE: ghcr.io/powback/powos

jobs:
  disk-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (for build/install-to-usb.sh)
        uses: actions/checkout@v4

      - name: Free disk space (bazzite images are large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost \
                      /usr/share/swift /usr/local/.ghcup /usr/local/share/powershell \
                      /usr/local/julia* /usr/lib/jvm /usr/local/share/chromium \
                      /usr/local/lib/node_modules /usr/share/miniconda /opt/az \
                      /usr/lib/google-cloud-sdk /opt/microsoft /usr/lib/firefox || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Create reflink-capable scratch volume (XFS loopback)
        # Sparse backing file: grows on demand, so containers-storage on the
        # root fs and the scratch volume share the same free-space pool
        # instead of each reserving worst-case upfront.
        run: |
          sudo truncate -s 45G /scratch.img
          loop=$(sudo losetup -f --show /scratch.img)
          sudo mkfs.xfs -q "$loop"
          sudo mkdir -p /build
          sudo mount "$loop" /build
          sudo mkdir -p /build/store /build/output
          df -h /build

      - name: Log in to GHCR (rootful podman)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull OS image
        run: sudo podman pull ${{ env.IMAGE }}:${{ inputs.variant }}

      - name: Build raw disk image
        run: |
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v /build/output:/output \
            -v /build/store:/store \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type raw --rootfs btrfs \
            ${{ env.IMAGE }}:${{ inputs.variant }}
          sudo ls -lh /build/output/image/

      - name: Bake POWOS-DATA + install/recovery boot entries into the image
        # The flashed USB must be complete out of the box — no post-boot
        # commands. Extend the raw by 6G of free tail, attach it as a loop
        # device, and run the SAME setup that install-to-usb.sh does on real
        # hardware: POWOS-DATA partition (triggers RAM boot), persistence
        # structure, and the Install/Recovery BLS boot entries.
        run: |
          sudo apt-get install -y --no-install-recommends btrfs-progs >/dev/null
          sudo truncate -s +6G /build/output/image/disk.raw
          loop=$(sudo losetup -fP --show /build/output/image/disk.raw)
          # OVERRIDE_REMOVABLE: a loop device is never "removable"; the safety
          # check is for real internal drives, not a file we just created.
          sudo POWOS_OVERRIDE_REMOVABLE=1 bash build/install-to-usb.sh --setup-data-only "$loop"
          sudo losetup -d "$loop"

      - name: E2E boot the raw image in QEMU and assert login screen appears
        # The whole point of this workflow is to produce a disk image that
        # ACTUALLY BOOTS. Everything below (compression, artifact upload)
        # runs only if the image passes a real UEFI boot in a KVM VM and
        # reaches a login prompt without wedging. Catches the class of bugs
        # we've historically shipped (plasmalogin not enabled, sysext refusing
        # to merge because an extension carries os-release, powos-hydrate
        # crashing at unbound HOME, ctrl-alt-del=reboot loops, etc.) BEFORE
        # anyone flashes the image.
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf expect >/dev/null
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm || echo "no KVM, will be slow"

          # OVMF vars must be writable per-VM.
          sudo mkdir -p /build/vm
          sudo cp /usr/share/OVMF/OVMF_CODE_4M.fd /build/vm/CODE.fd 2>/dev/null \
             || sudo cp /usr/share/OVMF/OVMF_CODE.fd /build/vm/CODE.fd
          sudo cp /usr/share/OVMF/OVMF_VARS_4M.fd /build/vm/VARS.fd 2>/dev/null \
             || sudo cp /usr/share/OVMF/OVMF_VARS.fd /build/vm/VARS.fd

          # Serial console gives us the boot log to grep on. plymouth off so
          # the console prints readable text, not a splash-screen framebuffer.
          # Cap at 10 min: a healthy boot is under 3 min; longer means hung.
          sudo timeout 600 qemu-system-x86_64 \
            -enable-kvm -machine q35,smm=on -cpu host -smp 4 -m 8G \
            -drive if=pflash,format=raw,readonly=on,file=/build/vm/CODE.fd \
            -drive if=pflash,format=raw,file=/build/vm/VARS.fd \
            -drive file=/build/output/image/disk.raw,format=raw,if=virtio \
            -netdev user,id=n0 -device virtio-net-pci,netdev=n0 \
            -serial file:/build/vm/console.log \
            -display none \
            -no-reboot &
          qemu_pid=$!

          # Watch the serial console for the success marker OR any known
          # failure signature. Success: SDDM/plasmalogin issues a Wayland/X
          # session line or systemd reports 'Reached target Login Prompts'
          # (getty on tty1 is also fine — this is a headless VM without a GPU,
          # so plasmalogin may not render but SHOULD have tried to start).
          success='Reached target Login Prompts|Started .*Login Manager|Started SDDM|Started Plasma Login|plasmalogin\.service.*Started'
          fail='Failed to start plasmalogin|Failed to start SDDM|systemd.*Received SIGINT|Kernel panic|Emergency mode|systemd-sysext.service.*Failed|powos-overlay.service.*failed|Failed to merge|Extension contains|Reached target Emergency|Reached target Rescue'

          got=""
          for i in $(seq 1 60); do   # up to ~10 min at 10s/tick
            sleep 10
            sudo touch /build/vm/console.log
            if sudo grep -qE "$fail" /build/vm/console.log; then
              got=fail; break
            fi
            if sudo grep -qE "$success" /build/vm/console.log; then
              got=success; break
            fi
            if ! kill -0 $qemu_pid 2>/dev/null; then
              got="qemu-exited"; break
            fi
          done

          # Always dump the console log so failures are debuggable.
          echo "==================== BOOT CONSOLE LOG (tail) ===================="
          sudo tail -c 20000 /build/vm/console.log || true
          echo "==================== / BOOT CONSOLE LOG ========================="

          sudo kill -9 $qemu_pid 2>/dev/null || true
          wait $qemu_pid 2>/dev/null || true

          case "$got" in
            success)      echo "E2E boot passed — image reached a login prompt." ;;
            fail)         echo "E2E boot FAILED — matched a known failure signature."; exit 1 ;;
            qemu-exited)  echo "E2E boot FAILED — QEMU exited before reaching a login prompt."; exit 1 ;;
            *)            echo "E2E boot FAILED — no login/failure marker within timeout."; exit 1 ;;
          esac

      - name: Upload boot console log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-console-${{ inputs.variant }}
          path: /build/vm/console.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Compress
        run: |
          sudo mv /build/output/image/disk.raw /build/output/powos-${{ inputs.variant }}.raw
          # Free the store's reflink twin first — zstd output needs real bytes.
          sudo rm -rf /build/store
          sudo zstd -T0 --sparse --rm /build/output/powos-${{ inputs.variant }}.raw
          ls -lh /build/output/

      - name: Disk telemetry (postmortem aid)
        if: always()
        run: df -h / /build 2>/dev/null || df -h /

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: powos-${{ inputs.variant }}-raw
          path: /build/output/powos-${{ inputs.variant }}.raw.zst
          retention-days: 7
          compression-level: 0  # already zstd-compressed
