name: Registry Cleanup

# GHCR retention: every push publishes multi-GB image versions (sha-tagged)
# plus build-cache layers, and private-package storage counts against the
# account quota — unbounded, that's real money.
#
# Retention policy:
#   powos           keep the newest 30 versions + drop untagged manifests.
#                   Channel tags (:nvidia-open, :latest, ...) always point at
#                   recent versions so they survive; only stale sha-pinned
#                   history ages out. CAVEAT: a variant that stops being
#                   built for a long time will eventually age out of the
#                   newest-30 window — rebuild it via workflow_dispatch on
#                   build-publish if you need it again.
#   powos-cache-*   pure build cache, keep only the newest 5.
#
# WHY THIS RUNS DAILY (not weekly):
# The GitHub Container Registry API used to be paginated at 100 versions per
# call, and delete requests only accept one version at a time. When the cache
# backlog grows into the thousands (we hit 1589 versions on
# powos-cache-nvidia-open on 2026-07-06 and the weekly cron failed on
# retention lag), one weekly run can't catch up. Daily + a per-run loop that
# drains up to N pages keeps us at target even after a busy build week.
#
# Manual runs for catch-up: workflow_dispatch with passes=N walks up to N
# pages of 100 deletions per package. Default 20 = up to 2000/run/package.

on:
  schedule:
    - cron: '0 5 * * *'   # daily 05:00 UTC
  workflow_dispatch:
    inputs:
      passes:
        description: 'Max delete-pages per package per run (100 versions each)'
        required: false
        default: '20'

concurrency:
  group: registry-cleanup
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: powos
            keep: 30
            drop-untagged: true
          - name: powos-cache-nvidia-open
            keep: 5
            drop-untagged: false
          - name: powos-cache-nvidia-open-testing
            keep: 5
            drop-untagged: false
          # `powos-cache-nvidia` and `powos-cache-main` were listed here
          # during the 2026-Q1 matrix trim to drain the last stragglers,
          # but the packages themselves have been deleted from GHCR since
          # (verified 2026-07-08 — both return 404). Dropped from the
          # matrix so the workflow doesn't spend a job hitting a dead
          # endpoint. If we ever spin up new variants, add them here.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PACKAGE: ${{ matrix.name }}
      KEEP: ${{ matrix.keep }}
      PASSES: ${{ github.event.inputs.passes || '20' }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Prune ${{ matrix.name }} (keep ${{ matrix.keep }})
        run: |
          set -euo pipefail

          # Powback is a user account (not an org). Endpoints:
          #   read/list: /users/{user}/packages/container/{pkg}/versions
          #   delete:    /user/packages/container/{pkg}/versions/{id}
          # The delete path uses `/user/` (singular, current-token-holder)
          # because a user can only delete their own packages.
          base="/users/$OWNER/packages/container/$PACKAGE/versions"
          del_base="/user/packages/container/$PACKAGE/versions"

          # NOTE on `gh api --paginate`: it concatenates one JSON array per
          # page in the output stream — NOT a single flat JSON array. So a
          # naive `jq 'length'` returns the length of ONE page.  Either:
          #   (a) use `gh api --paginate --jq '.[]'` to emit one object per
          #       line and re-slurp with `jq -s`, OR
          #   (b) let jq count each page and sum with awk.
          # We use (a) throughout for consistency.

          # Count total (one line per version → wc -l).
          total=$(gh api --paginate --jq '.[].id' "$base" 2>/dev/null | wc -l)
          echo "package=$PACKAGE total=$total keep=$KEEP passes=$PASSES"

          # 1. Untagged manifests (powos only).
          if [[ "${{ matrix.drop-untagged }}" == "true" ]]; then
            echo "--- dropping untagged manifests ---"
            drop_count=0
            while IFS= read -r id; do
              [[ -z "$id" ]] && continue
              gh api -X DELETE "$del_base/$id" >/dev/null 2>&1 && drop_count=$((drop_count+1))
            done < <(gh api --paginate --jq '.[] | select(.metadata.container.tags == []) | .id' "$base")
            echo "untagged dropped: $drop_count"
          fi

          # 2. Retention prune. Fetch all versions as ONE array (--slurp),
          # sort newest-first, drop the first KEEP, delete the tail in
          # batches of 100 up to PASSES times.
          echo "--- retention prune ---"
          deleted_total=0
          for pass in $(seq 1 "$PASSES"); do
            ids=$(gh api --paginate --jq '.[] | {id, created_at}' "$base" \
                  | jq -s --argjson k "$KEEP" -r \
                    'sort_by(.created_at) | reverse | .[$k:] | .[].id' \
                  | head -100)
            if [[ -z "$ids" ]]; then
              echo "pass $pass: nothing over retention — done"
              break
            fi
            pass_deleted=0
            while IFS= read -r id; do
              [[ -z "$id" ]] && continue
              gh api -X DELETE "$del_base/$id" >/dev/null 2>&1 && pass_deleted=$((pass_deleted+1))
            done <<< "$ids"
            deleted_total=$((deleted_total + pass_deleted))
            echo "pass $pass: deleted $pass_deleted (running total: $deleted_total)"
            # If a pass deleted less than 100, the tail is short — we're done.
            [[ "$pass_deleted" -lt 100 ]] && { echo "queue drained"; break; }
          done

          # Report final. Same one-id-per-line pattern as the count above.
          remaining=$(gh api --paginate --jq '.[].id' "$base" 2>/dev/null | wc -l)
          echo "final: package=$PACKAGE remaining=$remaining (target: $KEEP)"
