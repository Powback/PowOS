name: PowOS CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  tier1-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        # Gate on real errors only; the ~113 pre-existing info/style/warning
        # findings are tracked debt (tighten to -S warning once cleaned up).
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -S error bin/* lib/*.sh build/*.sh

      - name: Run Hardware Detect Tests
        run: bash test/tier1/test-hardware-detect.sh

      - name: Run Pinstall Tests
        run: bash test/tier1/test-pinstall.sh

      - name: Run Installer Tests
        run: bash test/tier1/test-install-system.sh

      - name: Run VM Tests
        run: bash test/tier1/test-vm.sh

      - name: Run Variant-Select Tests
        run: bash test/tier1/test-variant-select.sh

      - name: Run Base-Swap Tests
        run: bash test/tier1/test-base.sh

      - name: Run Boot-Manager Tests
        run: bash test/tier1/test-boot-manager.sh

      - name: Run Data Integrity Tests
        run: |
          pip install psutil rich 2>/dev/null || true
          python3 test/tier1/test-layer-sync.py
          python3 test/tier1/test-cachefs.py

      - name: Free disk space (bazzite base is ~10GB; default runner has ~14GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Vendor bazzite system_files (Containerfile COPYs it)
        run: ./build/vendor-bazzite.sh

      # podman, not docker: the bazzite base ships ~100 layers and docker's
      # overlay driver dies with "max depth exceeded"; podman builds it fine
      # (same reason build-publish.yml uses podman). Mirrors the compose
      # test-runner service definition.
      - name: Container Test (podman — replicates compose test-runner)
        run: |
          podman build -f Containerfile -t powos-ci .
          podman run --rm -v "$PWD:/powos:rw" -e POWOS_ROOT=/powos \
            --entrypoint /bin/bash powos-ci -c '
              set -e
              echo "Running Tests..."
              bash /powos/test/tier1/test-hardware-detect.sh
              bash /powos/test/tier1/test-pinstall.sh
              bash /powos/test/tier1/test-overlay.sh
              bash /powos/test/tier1/test-sync.sh
              bash /powos/test/tier1/test-ai-agent.sh
            '

  e2e-tests:
    runs-on: ubuntu-latest
    needs: tier1-tests
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (bazzite base is ~10GB; default runner has ~14GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/share/swift /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Vendor bazzite system_files (Containerfile COPYs it)
        run: ./build/vendor-bazzite.sh

      # podman for the same layer-depth reason as tier1 (see comment there).
      # ROOTFUL (sudo): layer-sync rsyncs overlayfs whiteouts (char devices) and
      # mknod is denied in a rootless user namespace even with --privileged.
      # Mirrors the compose e2e-runner service definition.
      - name: Run E2E Tests (podman — replicates compose e2e-runner)
        run: |
          sudo podman build -f Containerfile --build-arg INSTALL_E2E_DEPS=1 -t powos-e2e .
          sudo podman volume create powos-e2e-usb
          sudo podman run --rm --privileged --hostname powos-e2e \
            --device /dev/fuse --device /dev/loop-control \
            -v "$PWD:/powos:ro" -v powos-e2e-usb:/var/lib/powos-test \
            --tmpfs /run/powos --tmpfs /tmp \
            -e POWOS_ROOT=/powos -e POWOS_E2E=1 \
            --entrypoint /bin/bash powos-e2e /powos/test/e2e/run-e2e.sh
