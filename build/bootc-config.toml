[[customizations.user]]
name = "powos"
password = "powos"
groups = ["wheel"]

# ─────────────────────────────────────────────────────────────────
# Installer kickstart safety customizations
# Only used when building with: ./build/build-iso.sh installer
#
# CRITICAL: The installer ISO will ERASE the selected drive.
# Use ./build/build-iso.sh live-usb for safe live boot instead.
# ─────────────────────────────────────────────────────────────────
[customizations.installer.kickstart]
contents = """
# PowOS Installer Kickstart
# WARNING: This installer ERASES the target drive.
# For live boot (recommended), use build-iso.sh live-usb instead.

# Require interactive installation - user must select target disk
# Remove 'text' and add 'graphical' for GUI installer
text

# Do NOT auto-select disks - user must confirm
# ignoredisk and clearpart are left unset to require manual selection
%pre
#!/bin/bash
# Safety: list all available disks for user to review
echo "============================================"
echo "AVAILABLE DISKS:"
echo "============================================"
lsblk -d -o NAME,SIZE,MODEL,TRAN,HOTPLUG 2>/dev/null || lsblk -d -o NAME,SIZE,MODEL
echo "============================================"
echo "WARNING: Only select your target USB drive!"
echo "Internal drives (HOTPLUG=0) will be destroyed"
echo "if selected."
echo "============================================"
%end
"""
