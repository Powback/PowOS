// PowOS default logid.cfg — safe empty device list.
//
// logid (LogiOps) is enabled at boot but does NOTHING until a device stanza
// is added here. This file exists only so the daemon starts cleanly instead
// of failing on missing config. Live under /etc/, so any edits survive
// bootc upgrades via the standard /etc 3-way merge.
//
// To add a device: `logid --help` for the CLI, or see examples at
//   https://github.com/PixlOne/logiops/blob/main/README.md
// Common Logitech G-series and MX Master patterns are in the wiki.
//
// A minimal example that adds a keybind macro to a G-key on a G710:
//
//   devices: ({
//       name: "G710";
//       buttons: ({
//           cid: 0xC3;                       // G1 key
//           action: {
//               type: "Keypress";
//               keys: ["KEY_LEFTCTRL", "KEY_LEFTSHIFT", "KEY_T"];
//           };
//       });
//   });

devices: ();
