#!/usr/bin/env bash
# laptop-intel-battery.conf - Laptop with Intel GPU on battery

# CPU powersave
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        echo "powersave" > "$cpu" 2>/dev/null || true
    fi
done

# Disable turbo for battery
if [[ -w /sys/devices/system/cpu/intel_pstate/no_turbo ]]; then
    echo 1 > /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
fi

# Enable laptop mode
if [[ -f /proc/sys/vm/laptop_mode ]] && [[ -w /proc/sys/vm/laptop_mode ]]; then
    echo 5 > /proc/sys/vm/laptop_mode 2>/dev/null || true
fi

# Aggressive writeback
if [[ -w /proc/sys/vm/dirty_writeback_centisecs ]]; then
    echo 6000 > /proc/sys/vm/dirty_writeback_centisecs 2>/dev/null || true
fi

# SATA power management
for link in /sys/class/scsi_host/*/link_power_management_policy; do
    if [[ -w "$link" ]]; then
        echo "med_power_with_dipm" > "$link" 2>/dev/null || true
    fi
done

# Audio power save
if [[ -w /sys/module/snd_hda_intel/parameters/power_save ]]; then
    echo 1 > /sys/module/snd_hda_intel/parameters/power_save 2>/dev/null || true
fi

echo "[profile] Laptop Intel battery profile applied"
