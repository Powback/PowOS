#!/usr/bin/env bash
# laptop-generic.conf - Generic laptop profile (unknown GPU)

# Balanced CPU governor
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        # Check if schedutil is available (preferred for modern laptops)
        if grep -q "schedutil" "$cpu" 2>/dev/null; then
            echo "schedutil" > "$cpu" 2>/dev/null || true
        else
            echo "ondemand" > "$cpu" 2>/dev/null || true
        fi
    fi
done

# Moderate laptop mode
if [[ -f /proc/sys/vm/laptop_mode ]] && [[ -w /proc/sys/vm/laptop_mode ]]; then
    echo 2 > /proc/sys/vm/laptop_mode 2>/dev/null || true
fi

# Moderate writeback
if [[ -w /proc/sys/vm/dirty_writeback_centisecs ]]; then
    echo 1500 > /proc/sys/vm/dirty_writeback_centisecs 2>/dev/null || true
fi

echo "[profile] Laptop generic profile applied"
