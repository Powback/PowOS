# training-mode.conf - ML Training Mode Profile
# Applied when: User runs 'just mode training'
# Optimized for long-running ML training jobs

# Profile metadata
PROFILE_NAME="ML Training Mode"
PROFILE_DESCRIPTION="Maximum cooling and stability for long ML training runs"

# CPU Governor
CPU_GOVERNOR="performance"

# GPU Settings
GPU_POWER_LIMIT="max"
GPU_CLOCK_OFFSET=0
GPU_FAN_CONTROL="aggressive"

# Fan Control
FAN_PROFILE="aggressive"
FAN_MINIMUM_RPM=1200
FAN_TARGET_TEMP=70

# Power Management - DISABLE ALL SLEEP
DISABLE_SLEEP=true
SCREEN_BLANK_TIMEOUT=0
SUSPEND_TIMEOUT=0
HIBERNATE_TIMEOUT=0

# Scheduler
SCHEDULER_PROFILE="performance"

# Apply the profile settings
profile_apply() {
    echo "[profile] Applying: $PROFILE_NAME"
    echo "[profile] WARNING: Sleep/suspend disabled for training stability"

    # Set CPU governor to performance
    if command -v cpupower &>/dev/null; then
        cpupower frequency-set -g "$CPU_GOVERNOR" 2>/dev/null || true
    fi

    for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        if [[ -w "$cpu" ]]; then
            echo "$CPU_GOVERNOR" > "$cpu" 2>/dev/null || true
        fi
    done

    # Disable all sleep states
    if command -v systemctl &>/dev/null; then
        systemctl mask sleep.target suspend.target hibernate.target hybrid-sleep.target 2>/dev/null || true
    fi

    # Disable screen blanking
    if command -v xset &>/dev/null; then
        xset s off 2>/dev/null || true
        xset -dpms 2>/dev/null || true
    fi

    # Set aggressive fan curves via nvidia-settings if available
    if command -v nvidia-settings &>/dev/null; then
        # Enable manual fan control
        nvidia-settings -a "[gpu:0]/GPUFanControlState=1" 2>/dev/null || true
        nvidia-settings -a "[gpu:1]/GPUFanControlState=1" 2>/dev/null || true
        # Set fans to 80%
        nvidia-settings -a "[fan:0]/GPUTargetFanSpeed=80" 2>/dev/null || true
        nvidia-settings -a "[fan:1]/GPUTargetFanSpeed=80" 2>/dev/null || true
        nvidia-settings -a "[fan:2]/GPUTargetFanSpeed=80" 2>/dev/null || true
        nvidia-settings -a "[fan:3]/GPUTargetFanSpeed=80" 2>/dev/null || true
    fi

    # Set Nvidia power limit to max via nvidia-smi
    if command -v nvidia-smi &>/dev/null; then
        # Get max power limit
        local max_power
        max_power=$(nvidia-smi -q -d POWER | grep "Max Power Limit" | head -1 | awk '{print $5}' | cut -d'.' -f1)
        if [[ -n "$max_power" ]]; then
            nvidia-smi -pl "$max_power" 2>/dev/null || true
        fi
    fi

    # Disable laptop mode
    if [[ -f /proc/sys/vm/laptop_mode ]]; then
        echo 0 > /proc/sys/vm/laptop_mode 2>/dev/null || true
    fi

    # Set swappiness low for ML workloads
    echo 10 > /proc/sys/vm/swappiness 2>/dev/null || true

    echo "[profile] Applied: $PROFILE_NAME"
    echo "[profile] Run 'just mode desktop-performance' when training is complete"
}
