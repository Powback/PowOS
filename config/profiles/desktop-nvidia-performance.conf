#!/usr/bin/env bash
# desktop-nvidia-performance.conf - Desktop with NVIDIA GPU
#
# Maximum performance profile for desktop workstations with NVIDIA GPUs.
# Designed for dual RTX 3090 workstation or similar high-end setups.

# CPU maximum performance
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        echo "performance" > "$cpu" 2>/dev/null || true
    fi
done

# Enable all turbo features
if [[ -w /sys/devices/system/cpu/intel_pstate/no_turbo ]]; then
    echo 0 > /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
fi

# AMD PState if available
if [[ -w /sys/devices/system/cpu/amd_pstate/status ]]; then
    echo "active" > /sys/devices/system/cpu/amd_pstate/status 2>/dev/null || true
fi

# NVIDIA GPU setup
if command -v nvidia-smi &>/dev/null; then
    # Enable persistence mode (faster CUDA initialization)
    nvidia-smi -pm 1 2>/dev/null || true

    # Set compute mode for ML workloads
    nvidia-smi -c 0 2>/dev/null || true  # Default mode (allows graphics + compute)

    # Query and set power limits (use max available)
    for gpu in 0 1 2 3; do
        nvidia-smi -i $gpu -pl 350 2>/dev/null || true  # Adjust per GPU model
    done

    # Enable ECC if supported (data integrity for training)
    # nvidia-smi -e 1 2>/dev/null || true  # Uncomment if ECC desired
fi

# I/O scheduler optimization for NVMe
for device in /sys/block/nvme*/queue/scheduler; do
    if [[ -w "$device" ]]; then
        echo "none" > "$device" 2>/dev/null || true
    fi
done

# Disable laptop mode (we're on AC power)
if [[ -f /proc/sys/vm/laptop_mode ]] && [[ -w /proc/sys/vm/laptop_mode ]]; then
    echo 0 > /proc/sys/vm/laptop_mode 2>/dev/null || true
fi

# VM memory optimizations for large datasets
if [[ -w /proc/sys/vm/swappiness ]]; then
    echo 10 > /proc/sys/vm/swappiness 2>/dev/null || true
fi

# Increase max file handles (for ML training with many files)
if [[ -w /proc/sys/fs/file-max ]]; then
    echo 2097152 > /proc/sys/fs/file-max 2>/dev/null || true
fi

# Network optimizations
if [[ -w /proc/sys/net/core/rmem_max ]]; then
    echo 134217728 > /proc/sys/net/core/rmem_max 2>/dev/null || true
fi
if [[ -w /proc/sys/net/core/wmem_max ]]; then
    echo 134217728 > /proc/sys/net/core/wmem_max 2>/dev/null || true
fi

echo "[profile] Desktop NVIDIA performance profile applied"
