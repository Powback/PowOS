#!/usr/bin/env bash
# laptop-intel-performance.conf - Laptop with Intel GPU on AC power

# CPU performance
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        echo "performance" > "$cpu" 2>/dev/null || true
    fi
done

# Enable turbo
if [[ -w /sys/devices/system/cpu/intel_pstate/no_turbo ]]; then
    echo 0 > /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
fi

# Intel GPU default (auto power management)
# Intel GPUs are generally efficient, minimal tuning needed

# I/O scheduler
for device in /sys/block/nvme*/queue/scheduler; do
    if [[ -w "$device" ]]; then
        echo "none" > "$device" 2>/dev/null || true
    fi
done

echo "[profile] Laptop Intel performance profile applied"
