# default.conf - Default Fallback Profile
# Applied when hardware cannot be determined

PROFILE_NAME="Default"
PROFILE_DESCRIPTION="Balanced defaults for unknown hardware"

CPU_GOVERNOR="schedutil"
DISABLE_SLEEP=false
SCREEN_BLANK_TIMEOUT=300

profile_apply() {
    echo "[profile] Applying: $PROFILE_NAME"
    echo "[profile] Using balanced defaults"
}
