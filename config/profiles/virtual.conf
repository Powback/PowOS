# config/profiles/virtual.conf
#
# This profile is applied when PowOS detects it's running in a virtual machine
# or container environment (like Docker or WSL). It's designed to be minimal
# and avoid hardware-specific operations.

# Set basic power management (often not relevant in VMs, but for consistency)
# cpupower frequency-set -g performance

# Add any VM-specific configurations here.
# For example, disable specific hardware probes or services that cause issues in VMs.
# POWOS_VM_OPTIMIZATION="true"