# laptop-battery.conf - Battery Saving Laptop Profile
# Applied when: On battery power or integrated GPU only

# Profile metadata
PROFILE_NAME="Laptop Battery Saver"
PROFILE_DESCRIPTION="Maximum battery life for laptop use"

# CPU Governor
CPU_GOVERNOR="powersave"

# GPU Settings
GPU_POWER_LIMIT="min"

# Fan Control
FAN_PROFILE="silent"
FAN_MINIMUM_RPM=0

# Power Management
DISABLE_SLEEP=false
SCREEN_BLANK_TIMEOUT=120
SUSPEND_TIMEOUT=300

# Scheduler
SCHEDULER_PROFILE="battery"

# Apply the profile settings
profile_apply() {
    echo "[profile] Applying: $PROFILE_NAME"

    # Set CPU governor to powersave
    if command -v cpupower &>/dev/null; then
        cpupower frequency-set -g "$CPU_GOVERNOR" 2>/dev/null || true
    fi

    for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        if [[ -w "$cpu" ]]; then
            echo "$CPU_GOVERNOR" > "$cpu" 2>/dev/null || true
        fi
    done

    # Enable laptop mode
    if [[ -f /proc/sys/vm/laptop_mode ]]; then
        echo 5 > /proc/sys/vm/laptop_mode 2>/dev/null || true
    fi

    # Aggressive PCI power management
    for device in /sys/bus/pci/devices/*/power/control; do
        if [[ -w "$device" ]]; then
            echo "auto" > "$device" 2>/dev/null || true
        fi
    done

    # USB autosuspend
    for device in /sys/bus/usb/devices/*/power/autosuspend; do
        if [[ -w "$device" ]]; then
            echo 1 > "$device" 2>/dev/null || true
        fi
    done

    # SATA link power management
    for policy in /sys/class/scsi_host/*/link_power_management_policy; do
        if [[ -w "$policy" ]]; then
            echo "med_power_with_dipm" > "$policy" 2>/dev/null || true
        fi
    done

    # Enable TLP if available
    if command -v tlp &>/dev/null; then
        tlp bat 2>/dev/null || true
    fi

    echo "[profile] Applied: $PROFILE_NAME"
}
