#!/usr/bin/env bash
# laptop-nvidia-performance.conf - Laptop with NVIDIA GPU on AC power
#
# Prioritizes performance while still being mindful of thermals.
# GPU stays in high-performance mode, CPU runs at full speed.

# CPU performance mode
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        echo "performance" > "$cpu" 2>/dev/null || true
    fi
done

# Enable turbo boost
if [[ -w /sys/devices/system/cpu/intel_pstate/no_turbo ]]; then
    echo 0 > /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
fi

# NVIDIA GPU - prefer performance
if command -v nvidia-smi &>/dev/null; then
    nvidia-smi -pm 1 2>/dev/null || true  # Persistence mode
    nvidia-smi -pl 300 2>/dev/null || true  # Reasonable power limit for laptop
fi

# I/O scheduler for NVMe
for device in /sys/block/nvme*/queue/scheduler; do
    if [[ -w "$device" ]]; then
        echo "none" > "$device" 2>/dev/null || true
    fi
done

# Network latency optimization
if [[ -w /proc/sys/net/ipv4/tcp_low_latency ]]; then
    echo 1 > /proc/sys/net/ipv4/tcp_low_latency 2>/dev/null || true
fi

echo "[profile] Laptop NVIDIA performance profile applied"
