# desktop-performance.conf - High Performance Desktop Profile
# Applied when: nvidia-desktop GPU detected, AC power

# Profile metadata
PROFILE_NAME="Desktop Performance"
PROFILE_DESCRIPTION="Maximum performance for desktop workstations with dedicated GPUs"

# CPU Governor
CPU_GOVERNOR="performance"

# GPU Settings
GPU_POWER_LIMIT="max"
GPU_CLOCK_OFFSET=0

# Fan Control
FAN_PROFILE="balanced"
FAN_MINIMUM_RPM=800

# Power Management
DISABLE_SLEEP=false
SCREEN_BLANK_TIMEOUT=600

# Scheduler
SCHEDULER_PROFILE="performance"

# Apply the profile settings
profile_apply() {
    echo "[profile] Applying: $PROFILE_NAME"

    # Set CPU governor if cpupower available
    if command -v cpupower &>/dev/null; then
        cpupower frequency-set -g "$CPU_GOVERNOR" 2>/dev/null || true
    fi

    # Disable CPU power saving
    for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        if [[ -w "$cpu" ]]; then
            echo "$CPU_GOVERNOR" > "$cpu" 2>/dev/null || true
        fi
    done

    # Set system76-scheduler if available
    if command -v system76-scheduler &>/dev/null; then
        # Set to foreground boost mode
        echo "Setting system76-scheduler to performance mode"
    fi

    # Disable laptop-mode if present
    if [[ -f /proc/sys/vm/laptop_mode ]] && [[ -w /proc/sys/vm/laptop_mode ]]; then
        echo 0 > /proc/sys/vm/laptop_mode 2>/dev/null || true
    fi

    echo "[profile] Applied: $PROFILE_NAME"
}
