#!/usr/bin/env bash
# desktop-intel.conf - Desktop with Intel GPU

# CPU maximum performance
for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
    if [[ -w "$cpu" ]]; then
        echo "performance" > "$cpu" 2>/dev/null || true
    fi
done

# Enable turbo
if [[ -w /sys/devices/system/cpu/intel_pstate/no_turbo ]]; then
    echo 0 > /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
fi

# Disable laptop mode
if [[ -f /proc/sys/vm/laptop_mode ]] && [[ -w /proc/sys/vm/laptop_mode ]]; then
    echo 0 > /proc/sys/vm/laptop_mode 2>/dev/null || true
fi

# I/O scheduler for NVMe
for device in /sys/block/nvme*/queue/scheduler; do
    if [[ -w "$device" ]]; then
        echo "none" > "$device" 2>/dev/null || true
    fi
done

# Reduce swappiness
if [[ -w /proc/sys/vm/swappiness ]]; then
    echo 10 > /proc/sys/vm/swappiness 2>/dev/null || true
fi

echo "[profile] Desktop Intel profile applied"
