# vm-balanced.conf - Virtual Machine Profile
# Applied when running in QEMU/KVM/VirtualBox/VMware

PROFILE_NAME="VM Balanced"
PROFILE_DESCRIPTION="Optimized for virtual machine environments"

CPU_GOVERNOR="schedutil"
DISABLE_SLEEP=false

profile_apply() {
    echo "[profile] Applying: $PROFILE_NAME"
    echo "[profile] Running in virtual machine - using virtio optimizations"

    # VMs don't need aggressive power management
    # Just use sensible defaults
}
