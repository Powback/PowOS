# /etc/powos/windows.conf — declarative settings for `powos windows`
#
# Windows lives in ONE thin file on the shared games partition:
#     <POWOS-GAMES>/PowOS-Windows/windows.vhdx
# This file lets you set the unattended-install parameters ONCE instead of
# passing flags every time. Read by `powos windows create` and `install`
# (see `powos windows --help`). Point elsewhere with `--config PATH`.
#
# Precedence (low → high):
#     built-in default   <   this file   <   CLI flag
# A flag always beats the file; the file always beats the default. Blank or
# commented-out keys fall through to the built-in default.
#
# YOU SUPPLY YOUR OWN ISO + LICENSE. PowOS ships no Microsoft bits and never
# hosts a Windows image. Set WINDOWS_ISO to a file you already have, OR use
# `powos windows fetch-iso` to pull the OFFICIAL image straight from Microsoft
# (hash-verified) and optionally slim it — it downloads from MS's own servers,
# never a third-party/prebuilt image. `--fetch` on install does this inline.

# ── Backend ───────────────────────────────────────────────────────
# How Windows is stored on the PowOS disk. BOTH keep every Linux/PowOS
# partition invisible to Windows (GPT type-GUID exposure contract).
#   vhd        (default) ONE file, <POWOS-GAMES>/PowOS-Windows/windows.vhdx.
#              One blast radius (snapshot/delete as a file); retrofits an
#              already-burned USB. Metal boots COLD (no bare-metal resume) and
#              carries a small dynamic-VHD tax; boots off the shared PowOS ESP.
#   partition  Dedicated WIN-ESP + POWOS-WIN carved from the burn-time
#              unallocated tail (install-to-usb.sh --windows-gb). Windows sees
#              plain metal: native disk speed + REAL hibernation (seamless
#              resume), and its own ESP keeps Windows Update off PowOS's boot.
#              Needs that reserved tail to exist.
WINDOWS_BACKEND="vhd"

# ── Install media ─────────────────────────────────────────────────
# Absolute path to your Windows ISO. Required for `install` unless you pass
# --iso. A convenient place is the shared games partition, which both PowOS
# and Windows can see, e.g.:
#     WINDOWS_ISO="/var/mnt/games/Win11.iso"
WINDOWS_ISO=""

# ── Image ─────────────────────────────────────────────────────────
# MAX size in GB (minimum 40). The image is thin/dynamic and grows with use —
# but note a dynamic image expands toward this size on the first BARE-METAL
# boot, so don't oversize it.
WINDOWS_SIZE_GB=256

# Use a fixed (fully-allocated) image instead of dynamic. 1 sidesteps the
# native-boot expansion above by committing the full size up front.
WINDOWS_FIXED_VHD=0

# ── Edition / licensing ───────────────────────────────────────────
# Keyless edition selector (Windows Setup /IMAGE/NAME). Common values:
# "Windows 11 Pro" (recommended — native-boot niceties + policy knobs),
# "Windows 11 Home". Keyless installs run unactivated until a license applies.
WINDOWS_EDITION="Windows 11 Pro"

# Optional product key. Leave empty for a keyless install (the default).
WINDOWS_PRODUCT_KEY=""

# ── Account ───────────────────────────────────────────────────────
# Local administrator account created by the unattended install.
# ⚠  CHANGE THE PASSWORD — the default below is well-known.
WINDOWS_USERNAME="powos"
WINDOWS_PASSWORD="powos"

# ── Localization ──────────────────────────────────────────────────
# Display/system locale and keyboard (input) locale, BCP-47 (en-US, de-DE, …).
WINDOWS_LOCALE="en-US"
WINDOWS_KEYBOARD="en-US"

# ── Extras ────────────────────────────────────────────────────────
# Best-effort silent Steam install at first logon (1 = yes).
WINDOWS_WITH_STEAM=0

# QEMU resources for the install run (and `powos windows vm`).
WINDOWS_RAM="8G"
WINDOWS_CPUS="4"
