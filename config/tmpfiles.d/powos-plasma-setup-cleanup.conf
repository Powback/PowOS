# PowOS: neutralize Bazzite's first-run OOBE (plasma-setup) autologin leftover.
#
# plasma-setup.service is masked in the PowOS image, but a machine that booted
# PowOS BEFORE that mask (or was bootc-switched from generic Bazzite) may still
# have the autologin config it wrote: /etc/plasmalogin.conf.d/99-plasma-setup.conf
# with `User=plasma-setup`. PowOS runs its OWN first-boot flow, so that autologin
# is invalid — it fails every boot ("Authentication service cannot retrieve
# authentication info" / "Autologin failed") and leaves the plasmalogin greeter
# half-started: a cursor but no login form. Remove the leftover config, and set
# the OOBE done-marker so the service skips itself even if it is ever unmasked.
#
# systemd-tmpfiles runs 'r' (remove) and 'f' (create) at every boot, so this
# always converges regardless of prior deployment state.
#
#Type Path                                          Mode UID  GID  Age Argument
r     /etc/plasmalogin.conf.d/99-plasma-setup.conf
f     /etc/plasma-setup-done                        0644 root root -
