# PowOS: force display-manager.service to alias plasmalogin, overriding anything
# a prior install (anaconda's sddm.service alias) left behind in /etc.
#
# Rationale: bootc's /etc 3-way merge preserves user modifications from prior
# deployments. If a machine was installed as generic Bazzite (which enables
# sddm at install-time via preset), then bootc-switched to PowOS, the sddm
# alias survives and shadows PowOS's plasmalogin. Result: graphical.target
# starts nothing (sddm binary missing in PowOS image, plasmalogin never
# invoked). systemd-tmpfiles runs every boot with 'L+' (force-recreate
# symlink), so this always converges to the right target.
#
# 'L+' semantics: remove existing entry (any type), then create symlink.
#           type  path                                              mode uid gid age  argument
L+          /etc/systemd/system/display-manager.service              -     -   -   -    /usr/lib/systemd/system/plasmalogin.service
