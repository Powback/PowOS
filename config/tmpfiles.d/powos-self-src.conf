# PowOS: seed the writable source-tree snapshot at /var/lib/powos/src from
# the immutable reference at /usr/lib/powos/src on FIRST boot only.
#
# The reference lives under /usr (part of the read-only OS image), so it
# always reflects the currently-booted image. The user's working copy in
# /var is writable so `powos self test/pull/push` can operate on it.
#
# The 'C' type (create) only copies when the destination does NOT already
# exist — so subsequent bootc upgrades never clobber the user's in-progress
# edits. To re-sync from upstream, the user runs `powos self pull` (which
# does an attached-merge, not a hard reset).
#
# Seeded as the powos user (uid 1000) so unprivileged `powos self test/pull`
# can write to the tree. The Z line recursively RE-applies ownership on every
# boot, which self-heals any deployment where the initial C ran under a
# different rule (like our first cut) and left the tree root-owned.
#
# Type Path                     Mode UID    GID    Age  Source
C      /var/lib/powos/src       0755 powos  powos  -    /usr/lib/powos/src
Z      /var/lib/powos/src       -    powos  powos  -    -
