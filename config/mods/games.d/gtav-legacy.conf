# Grand Theft Auto V (Legacy) — PowOS mod install rules
# Classic GTA V build with the larger modding catalog.
# RAGE engine: ASI-based.

GAME_NAME="Grand Theft Auto V Legacy"
GAME_APPID=271590
GAME_NEXUS_SLUG="gta5"

GAME_BACKEND="asi"

GAME_FRAMEWORKS=(
    "script-hook-v:0:required"
    "asi-loader:0:required"
)

GAME_INSTALL_RULES=(
    "*.asi:."
    "*.dll:."
    "*.rpf:mods/update/x64/dlcpacks"
    "*.xml:."
    "*.ini:."
    "*.cfg:."
)

GAME_EXCLUDE_FROM_OVERLAY=(
    "compatdata"
    "shadercache"
)

GAME_VERIFY_CHECKS=(
    "file_exists:dinput8.dll"
    "pe_arch_64:dinput8.dll"
)

GAME_KNOWN_CONFLICTS=()
