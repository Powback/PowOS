# Grand Theft Auto V (Enhanced) — PowOS mod install rules
# RAGE engine: ASI-based, not mod-manager-driven.

GAME_NAME="Grand Theft Auto V Enhanced"
GAME_APPID=3240220
GAME_NEXUS_SLUG="gta5enhanced"

# RAGE engine games use the ASI backend
GAME_BACKEND="asi"

GAME_FRAMEWORKS=(
    "script-hook-v:0:required"
    "asi-loader:0:required"
)

GAME_INSTALL_RULES=(
    "*.asi:."
    "*.dll:."
    "*.rpf:mods/update/x64/dlcpacks"
    "*.xml:."
    "*.ini:."
    "*.cfg:."
)

GAME_EXCLUDE_FROM_OVERLAY=(
    "compatdata"
    "shadercache"
)

GAME_VERIFY_CHECKS=(
    "file_exists:dinput8.dll"
    "pe_arch_64:dinput8.dll"
)

GAME_KNOWN_CONFLICTS=()
