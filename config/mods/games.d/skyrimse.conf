# Skyrim Special Edition / Anniversary Edition — PowOS mod install rules

GAME_NAME="Skyrim Special Edition"
GAME_APPID=489830
GAME_NEXUS_SLUG="skyrimspecialedition"

GAME_FRAMEWORKS=(
    "skse64:30379:required"
    "address-library:32444:required"
)

GAME_INSTALL_RULES=(
    "*.esp:Data"
    "*.esm:Data"
    "*.esl:Data"
    "*.bsa:Data"
    "*.ba2:Data"
    "textures/*:Data/textures"
    "meshes/*:Data/meshes"
    "scripts/*:Data/scripts"
    "interface/*:Data/interface"
    "sound/*:Data/sound"
    "music/*:Data/music"
    "seq/*:Data/seq"
    "SKSE/Plugins/*.dll:Data/SKSE/Plugins"
    "SKSE/Plugins/*.ini:Data/SKSE/Plugins"
    "SKSE/Plugins/*.toml:Data/SKSE/Plugins"
    "SKSE/Plugins/*.json:Data/SKSE/Plugins"
    "*.ini:Data/SKSE/Plugins"
    "*.dll:Data/SKSE/Plugins"
    "Data/*:Data"
)

GAME_EXCLUDE_FROM_OVERLAY=(
    "compatdata"
    "shadercache"
)

GAME_VERIFY_CHECKS=(
    "file_exists:skse64_loader.exe"
    "dir_not_empty:Data"
)

GAME_KNOWN_CONFLICTS=()

GAME_LOAD_ORDER_TOOL="loot"
