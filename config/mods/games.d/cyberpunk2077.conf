# Cyberpunk 2077 — PowOS mod install rules
# Framework chain: RED4ext → REDscript → CET → ArchiveXL → TweakXL → content mods

GAME_NAME="Cyberpunk 2077"
GAME_APPID=1091500
GAME_NEXUS_SLUG="cyberpunk2077"

# Framework dependency chain (installed left-to-right, order matters)
# Format: name:nexus_mod_id:required|optional
GAME_FRAMEWORKS=(
    "red4ext:2060:required"
    "redscript:2880:required"
    "cyber-engine-tweaks:107:required"
    "archivexl:4198:required"
    "tweakxl:4197:required"
    "codeware:7587:optional"
    "input-loader:4575:optional"
)

# File pattern → target directory (relative to game root)
# First match wins. Patterns match against relative path or filename.
GAME_INSTALL_RULES=(
    "*.archive:archive/pc/mod"
    "*.xl:archive/pc/mod"
    "*.reds:r6/scripts"
    "*.lua:bin/x64/plugins/cyber_engine_tweaks/mods"
    "red4ext/*.dll:red4ext/plugins"
    "red4ext/plugins/*:red4ext/plugins"
    "bin/x64/*.dll:bin/x64"
    "bin/x64/plugins/*:bin/x64/plugins"
    "engine/*.ini:engine"
    "engine/config/*:engine/config"
    "r6/scripts/*:r6/scripts"
    "r6/tweaks/*:r6/tweaks"
    "archive/pc/mod/*:archive/pc/mod"
)

# Stay off the overlay (native FS only)
GAME_EXCLUDE_FROM_OVERLAY=(
    "compatdata"
    "shadercache"
)

# Post-install verification checks
GAME_VERIFY_CHECKS=(
    "dir_not_empty:archive/pc/mod"
)

# Known conflict patterns
GAME_KNOWN_CONFLICTS=()
