# Ollama Client Configuration
#
# This configures the Ollama local LLM client.
# Ollama runs models locally - no API key needed.

CLIENT_NAME="ollama"
CLIENT_CMD="ollama"

# Default model to use
# Common options: llama3.2, llama3.1, mistral, codellama, phi3
CLIENT_MODEL="llama3.2"

# Ollama API endpoint (for server checks)
CLIENT_ENDPOINT="http://localhost:11434"

# Check if server is running before use
# Set to true for more reliable detection, false for faster startup
OLLAMA_CHECK_SERVER=false

# Arguments for one-shot prompts
CLIENT_ONESHOT_ARGS="run"

# Arguments for interactive mode
CLIENT_INTERACTIVE_ARGS="run"

# Session handling (managed locally via JSON)
CLIENT_RESUME_ARGS=""
CLIENT_SESSION_ARG=""
CLIENT_SYSTEM_PROMPT_ARG=""
