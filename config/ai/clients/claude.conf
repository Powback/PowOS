# Claude CLI Client Configuration
#
# This configures the Claude CLI (claude-code or similar).
# Adjust arguments based on your specific Claude CLI version.

CLIENT_NAME="claude"
CLIENT_CMD="claude"

# Arguments for one-shot prompts (non-interactive)
# --print outputs response without interactive TUI
CLIENT_ONESHOT_ARGS="--print"

# Arguments for interactive mode
# Empty means use default claude interactive behavior
CLIENT_INTERACTIVE_ARGS=""

# Arguments for resuming/continuing a session
CLIENT_RESUME_ARGS="--continue"

# How to pass session ID (if supported)
CLIENT_SESSION_ARG=""

# How to pass system prompt
# -p is commonly used for system/prepend prompt
CLIENT_SYSTEM_PROMPT_ARG="-p"
