# Gemini CLI Client Configuration
#
# This configures the Gemini CLI tool.
# Adjust based on your specific Gemini CLI implementation.

CLIENT_NAME="gemini"
CLIENT_CMD="gemini"

# Arguments for one-shot prompts
# -p typically means "prompt" mode
CLIENT_ONESHOT_ARGS="-p"

# Arguments for interactive mode
# Empty if not supported - will fall back to loop
CLIENT_INTERACTIVE_ARGS=""

# Session handling (Gemini may not support native sessions)
CLIENT_RESUME_ARGS=""
CLIENT_SESSION_ARG=""

# System prompt handling
# Gemini CLI may not have direct system prompt support
# System prompt will be prepended to user prompt instead
CLIENT_SYSTEM_PROMPT_ARG=""
