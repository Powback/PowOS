# PowOS AI Agent System - Global Configuration
#
# This file configures the default behavior of the AI agent system.
# Edit this file or override with environment variables.

# Default AI client (claude, gemini, ollama)
AI_DEFAULT_CLIENT="claude"

# Default agent type (assistant, coder, devops)
AI_DEFAULT_AGENT="assistant"

# Fallback client if primary is unavailable
AI_FALLBACK_CLIENT="ollama"

# Session storage location
AI_SESSION_DIR="/var/lib/powos/state/ai/sessions"

# Enable/disable AI features globally
AI_ENABLED=true

# Debug mode (shows commands being run)
AI_DEBUG=false
