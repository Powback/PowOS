# PowOS — allow rootless containers to bind low ports (80/443)
#
# Why: PowOS ships Traefik as a rootless podman container so the whole
# reverse-proxy stack lives in the same user-level container graph as the
# services it routes to (`traefik` bridge network, podman.sock auto-discovery).
# The default `net.ipv4.ip_unprivileged_port_start = 1024` prevents unprivileged
# processes from binding <1024, which would force Traefik to run rootful
# (harder to compose with rootless services) or listen on 8080 (breaks the
# `service.pow` DNS convention where clients expect port 80).
#
# 80 is the lowest we need. Not 0 — that would let any user process bind
# common privileged services (22 SSH, 53 DNS) and mask them.
net.ipv4.ip_unprivileged_port_start = 80
