# PowOS — kernel-side self-recovery
#
# What this file changes and why every knob is here:
#
#   kernel.panic = 30
#     If the kernel panics, wait 30 seconds then hard-reboot. 30 s is a
#     compromise: long enough to notice on a keyboard-attached monitor
#     and hit a key to inspect the panic, short enough that a headless
#     server doesn't sit dead forever. `= 0` (default) is "hang here
#     until someone reboots me" which is the wrong default for a
#     mostly-headless PowOS box.
#
#   kernel.panic_on_oops = 1
#     Escalate a kernel oops to a full panic. Without this, an oops
#     leaves the machine in an inconsistent state (usually one CPU
#     wedged, others still running) that appears functional but has
#     random subtle breakage — nastier than a straight-up crash.
#     Combined with kernel.panic above, oops → panic → reboot in 30s.
#
#   kernel.hung_task_panic = 1
#     If a task is uninterruptibly sleeping (state D) longer than
#     hung_task_timeout_secs, panic instead of just complaining in dmesg.
#     Usually indicates a stuck kernel thread or a broken storage layer
#     that isn't responding — no amount of "waiting" will help, better
#     to reboot into a working state.
#
#   kernel.hung_task_timeout_secs = 120
#     120 s (default is 120 too, but pinning it explicitly for clarity).
#     Some legitimate workloads (large fsync on slow storage, huge
#     mmap flush) can stall a task for tens of seconds. 120 s means we
#     only panic on TRULY stuck kernel work, not on a benign slow syscall.
#
# Together these three knobs give PowOS a bounded worst-case downtime
# of 30 s on kernel crash + 120 s on hung task, versus the default
# "forever" for both.

kernel.panic                    = 30
kernel.panic_on_oops            = 1
kernel.hung_task_panic          = 1
kernel.hung_task_timeout_secs   = 120
