# PowOS RAM Boot Configuration
#
# This file configures the RAM overlay system that allows
# the USB to be unplugged while the system keeps running.

# Enable RAM boot (also requires rd.powos.ramboot=1 on kernel cmdline)
POWOS_RAMBOOT_ENABLED=true

# RAM size for overlay (writes go here)
# Recommended: 25-50% of total RAM
# Examples: 4G, 8G, 16G, 32G
POWOS_RAM_SIZE=8G

# Sync interval in seconds (how often to sync RAM changes to USB)
POWOS_SYNC_INTERVAL=30

# Auto-sync on USB reconnect
POWOS_SYNC_ON_RECONNECT=true

# Show desktop notifications for USB events
POWOS_NOTIFY_USB_EVENTS=true

# Directories to exclude from sync (space-separated)
# These stay in RAM only and are never synced to USB
POWOS_SYNC_EXCLUDE="/tmp /var/tmp /var/cache"
