# PowOS — never suspend via any logind trigger.
#
# WHY THIS FILE EXISTS
# PowOS boxes serve infrastructure (Traefik, container workloads, remote
# Docker API for pihole-sync, etc.). Any suspend event kills the network,
# breaks ongoing builds, and disconnects remote sessions. The KDE profile in
# config/kde/powermanagementprofilesrc handles display-side idle, but that
# does not cover logind-managed lid/power/suspend keys or the fallback
# idle-action that fires when all sessions inhibit-drop simultaneously.
#
# All handlers below are set to `ignore`, meaning:
#   - Closing the lid does nothing
#   - Pressing the physical suspend/hibernate key does nothing
#   - Idle-timeout inhibitor-loss does nothing
# Machine literally cannot suspend without a hardware power cut.
#
# Combined with the masked sleep/suspend/hibernate/hybrid-sleep targets
# (see Containerfile), there is no code path in the systemd graph that can
# put the box to sleep.

[Login]
HandleSuspendKey=ignore
HandleHibernateKey=ignore
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
IdleAction=ignore
