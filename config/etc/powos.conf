# /etc/powos/config - PowOS System Configuration
#
# This file is sourced at boot by PowOS services.
# Copy to /etc/powos/config and customize for your setup.
#
# ─────────────────────────────────────────────────────────────────
# Git State Repository
# ─────────────────────────────────────────────────────────────────

# URL of your PowOS state repository (optional)
# If set, hydration will clone/pull from this repo
# POWOS_GIT_REPO="https://github.com/username/powos-state.git"
# POWOS_GIT_REPO="git@github.com:username/powos-state.git"

# Branch to use (default: main)
# POWOS_GIT_BRANCH="main"

# ─────────────────────────────────────────────────────────────────
# PowOS Source Updates ('powos update self --pull')
# ─────────────────────────────────────────────────────────────────

# Upstream repo for 'powos update self --pull'. The bundled source at
# /var/lib/powos/src ships WITHOUT a .git dir (excluded from the image), so
# --pull clones this URL fresh to get the latest scripts. For a private repo,
# this machine needs git credentials (gh auth / a credential helper).
# POWOS_UPSTREAM="https://github.com/Powback/PowOS.git"

# ─────────────────────────────────────────────────────────────────
# CacheFS (Lazy-Loading User Data)
# ─────────────────────────────────────────────────────────────────

# Enable lazy-loading FUSE filesystem for /home/powos (opt-in).
# Disabled by default: CacheFS is experimental and has known issues
# (missing fsync, potential data loss on power failure). When disabled,
# PowOS uses a direct bind mount of USB home instead.
# Set to true only after verifying your use case and understanding the risks.
POWOS_CACHEFS_ENABLED=false

# RAM cache size for CacheFS (only used when POWOS_CACHEFS_ENABLED=true)
# POWOS_CACHE_SIZE="4G"

# ─────────────────────────────────────────────────────────────────
# Storage Configuration
# ─────────────────────────────────────────────────────────────────

# Path to persistent storage (auto-detected if not set)
# This is where PowOS stores extensions, sources, and state
# POWOS_PERSISTENT="/mnt/powos"

# Label to look for when auto-detecting storage
# POWOS_DISK_LABEL="POWOS"

# ─────────────────────────────────────────────────────────────────
# Hardware Detection
# ─────────────────────────────────────────────────────────────────

# Force a specific hardware profile (skip auto-detection)
# POWOS_FORCE_PROFILE="desktop-nvidia-performance"

# Override GPU detection (useful for hybrid graphics)
# POWOS_FORCE_GPU="nvidia"

# ─────────────────────────────────────────────────────────────────
# Overlay System
# ─────────────────────────────────────────────────────────────────

# Auto-enable all overlays at boot (default: true)
# POWOS_AUTO_OVERLAYS=true

# OS identification for extension-release files
# Must match your base OS (check /etc/os-release)
POWOS_OS_ID="fedora"
POWOS_OS_VERSION="41"

# ─────────────────────────────────────────────────────────────────
# Distrobox Containers
# ─────────────────────────────────────────────────────────────────

# Auto-create containers at boot (default: true on first hydration)
# POWOS_AUTO_CONTAINERS=true

# Default container to use for development
# POWOS_DEFAULT_CONTAINER="powos-dev"

# ─────────────────────────────────────────────────────────────────
# AI Self-Healing (Ollama)
# ─────────────────────────────────────────────────────────────────

# Enable AI-powered patch conflict resolution
# POWOS_AI_ENABLED=false

# Ollama endpoint
# POWOS_OLLAMA_URL="http://localhost:11434"

# Model to use for code analysis
# POWOS_OLLAMA_MODEL="codellama:7b"

# ─────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────

# Log verbosity: debug, info, warn, error
# POWOS_LOG_LEVEL="info"

# Log to file in addition to journal
# POWOS_LOG_FILE="/var/log/powos/powos.log"

# ─────────────────────────────────────────────────────────────────
# Development Mode
# ─────────────────────────────────────────────────────────────────

# Enable development mode (simulate sysext changes)
# POWOS_DEV=0

# Mock hardware for testing
# POWOS_MOCK_HARDWARE="nvidia"
# POWOS_MOCK_POWER="ac"
# POWOS_MOCK_VIRT="physical"
