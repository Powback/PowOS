# PowOS — allow additional authorized_keys files to be shipped in the image.
#
# WHY THIS FILE EXISTS
# We want PowOS to ship pre-authorized SSH keys for infrastructure clients
# (e.g. powstation'\''s pihole-sync tunneling the Docker API over SSH). Editing
# ~powos/.ssh/authorized_keys at build time is fragile (owned by user, gets
# clobbered by the user setup layer). Instead, sshd is told to consult
# /etc/ssh/authorized_keys.d/<username> in addition to the user'\''s own file.
#
# Files under /etc/ssh/authorized_keys.d/ are owned by root, mode 644 — safe
# from user tampering, easy to version-control and ship in the image.
AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys.d/%u
