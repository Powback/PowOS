# PowOS — teach podman about /etc/containers/oci/hooks.d in addition to
# /usr/share/... Podman deprecated implicit hook discovery in recent
# versions; without this drop-in, hooks shipped at /etc/... are ignored.
#
# WHY THIS ORDER
# /etc/ first so admin/image drop-ins can override anything shipped by
# podman itself under /usr/share/.
[engine]
hooks_dir = [
    "/etc/containers/oci/hooks.d",
    "/usr/share/containers/oci/hooks.d",
]
