# PowOS: disable Wi-Fi powersave on every managed connection.
#
# Wi-Fi PSM (Power Save Mode) tells the NIC to sleep between beacon frames
# to save battery. On a plugged-in headless/desktop PowOS box the battery
# saving is worthless and the latency spikes / dropped SSH sessions from
# the NIC waking up are actively harmful.
#
# NetworkManager values (from man NetworkManager.conf):
#   0 = use NM default (which honors driver default = usually "on")
#   1 = ignore (don't touch the driver's setting)
#   2 = disable powersave  ← what we want
#   3 = enable powersave
#
# 2 is unconditional off. Applied to every connection NM manages by
# default; individual connections can still override in their own file
# under /etc/NetworkManager/system-connections/ if a specific mobile
# device profile ever needs battery savings.

[connection]
wifi.powersave = 2
