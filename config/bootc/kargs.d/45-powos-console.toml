# PowOS console ordering — make the SCREEN (tty0) the PRIMARY console.
#
# bootc-image-builder bakes `rw console=tty0 console=ttyS0` as its base kernel
# args. With multiple console= args the LAST one is the PRIMARY console, so
# ttyS0 (a serial port — invisible on a real desktop) seizes the console and
# the physical screen goes quiet during boot. That is a debugging leftover.
#
# kargs.d entries are APPENDED after the bib defaults, so re-adding console=tty0
# here makes tty0 the last (= primary) console again: the screen shows boot
# messages. ttyS0 stays as a secondary console (kept so the e2e serial-log tier
# still receives output). Applies to BOTH the live and installer variants.
kargs = ["console=tty0"]
