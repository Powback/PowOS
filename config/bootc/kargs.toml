# PowOS Kernel Arguments for bootc
# These get added to the kernel command line at boot

[kargs]
# Enable PowOS RAM boot - entire OS runs from RAM
# USB can be unplugged after boot without crashing
rd.powos.ramboot = "1"

# RAM size for overlay (default 8G, adjust based on your RAM)
rd.powos.ramsize = "8G"

# Quiet boot with splash
quiet = true
splash = true
