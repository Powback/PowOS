# PowOS Distrobox Configuration
# This file is automatically managed by pinstall/premove
# Manual edits are preserved, but package lists are managed by scripts
#
# Documentation: https://github.com/89luca89/distrobox/blob/main/docs/usage/distrobox-assemble.md

# ═══════════════════════════════════════════════════════════════════
#  Primary Development Container (Arch Linux)
# ═══════════════════════════════════════════════════════════════════
[powos-dev]
# Base image - Arch for rolling release and AUR access
image=archlinux:latest

# Packages installed by pinstall (DO NOT EDIT THIS LINE MANUALLY)
additional_packages=

# Container behavior
init=false
nvidia=false
pull=true
root=false
replace=true
start_now=false

# Home directory integration
home=/var/home/powos

# ═══════════════════════════════════════════════════════════════════
#  Node.js Development Container
# ═══════════════════════════════════════════════════════════════════
[powos-node]
image=node:20-bookworm
additional_packages=
init=false
pull=true
root=false
replace=true
start_now=false
home=/var/home/powos

# ═══════════════════════════════════════════════════════════════════
#  Python/ML Development Container
# ═══════════════════════════════════════════════════════════════════
[powos-python]
image=python:3.12-bookworm
additional_packages=
init=false
nvidia=true
pull=true
root=false
replace=true
start_now=false
home=/var/home/powos

# ═══════════════════════════════════════════════════════════════════
#  Build Environment (Fedora - matches base OS)
# ═══════════════════════════════════════════════════════════════════
[powos-build]
image=fedora:41
additional_packages=gcc gcc-c++ make cmake meson ninja-build
init=false
pull=true
root=false
replace=true
start_now=false
home=/var/home/powos
